<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasnain ? Ayesha</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#141E30,#243B55);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
}

/* floating hearts background */

.hearts span{
position:absolute;
color:red;
font-size:20px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* card */

.card{
width:380px;
height:300px;
background:white;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
padding-top:30px;
}

.title{
font-size:30px;
font-weight:bold;
}

.characters{
margin-top:30px;
display:flex;
justify-content:space-around;
align-items:center;
}

.heart{
font-size:40px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#e91e63;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

/* love letter popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.letter{
background:white;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
animation:openLetter 1s;
}

@keyframes openLetter{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

.close{
margin-top:15px;
background:#2196f3;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
Hasnain ? Ayesha
</div>

<div class="characters">

<div>?? Hasnain</div>

<div class="heart">?</div>

<div>?? Ayesha</div>

</div>

<button onclick="openLetter()">Click for Surprise ??</button>

</div>

<!-- Love Letter Popup -->

<div class="popup" id="popup">

<div class="letter">

<h2>?? Love Letter</h2>

<p>
Ayesha,  
You are the most special person in my life.  
This small website is made just for you. ?
</p>

<button class="close" onclick="closeLetter()">Close</button>

</div>

</div>

<script>

function openLetter(){
document.getElementById("popup").style.display="flex";
createHearts();
}

function closeLetter(){
document.getElementById("popup").style.display="none";
}

function createHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div");

heart.innerHTML="?";

heart.style.position="fixed";
heart.style.left=Math.random()*100+"%";
heart.style.top="100%";
heart.style.fontSize="20px";
heart.style.color="red";
heart.style.animation="float 3s linear";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},3000);

}

}

</script>

</body>
</html>
